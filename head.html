<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataFix | Creator Edition</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body data-theme="dark">

<!-- LOGIN -->
{% if not logged_in %}
<div class="login-overlay">
    <div class="login-card text-center">
        
        <div class="text-end mb-2">
            <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="toggleV()">
                <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
        </div>

        <div class="logo-donut mb-3 mx-auto"></div>

        <h4 class="fw-bold mb-1">DataFix</h4>
        <p class="small text-muted mb-4">Creator Access</p>

        <form action="/login" method="POST">
            <input type="text" name="u" class="form-control mb-3" placeholder="Username" required>

            <div class="input-group mb-4">
                <input type="password" id="passInput" name="p" class="form-control" placeholder="Password" required>
                <span class="input-group-text bg-transparent border-start-0">
                    <i class="fa-solid fa-eye orange-eye" id="eyeIcon" onclick="togglePass()"></i>
                </span>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login</button>
        </form>
    </div>
</div>

{% else %}

<!-- MAIN DASHBOARD -->
<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div class="d-flex align-items-center">
            <div class="logo-donut me-3"></div>
            <h2 class="fw-bold m-0">DataFix</h2>
        </div>

        <div>
            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="toggleV()">Vision Mode</button>
            <a href="/logout" class="btn btn-sm btn-danger rounded-pill px-3 ms-2">Exit</a>
        </div>
    </div>

    <!-- STEP 1 -->
    <div class="card p-4 shadow-sm mb-4 viz-display-area">
        <h5 class="fw-bold text-primary mb-3">Step 1: Upload Dataset</h5>

        <form method="POST" enctype="multipart/form-data" class="row g-2">
            <div class="col-md-10">
                <input type="file" name="dataset" class="form-control"
                accept=".csv, .xlsx, .xls, .xlsm, .xlsb" required>
            </div>

            <p class="small text-warning mt-2">
                ⚠ Max 20MB (Premium: 50MB+ support coming soon 🚀)
            </p>

            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100 fw-bold">Process</button>
            </div>
        </form>
    </div>

    {% if cleaned %}

    <!-- STEP 2 -->
    <h5 class="fw-bold text-primary mb-3">Step 2: Data Summary</h5>

    <div class="text-center">
        <div class="table-container shadow-sm mb-4">
            <div class="table-responsive">
                {{ stats|safe }}
            </div>
        </div>
    </div>

    <!-- STEP 3 -->
    <h5 class="fw-bold text-primary mb-3">Step 3: Analytics</h5>

    <div class="d-flex flex-wrap gap-2 mb-3">
        <button class="btn btn-primary nav-pill-btn px-4" id="btn-bar" onclick="showG('bar')">Bar</button>
        <button class="btn btn-outline-primary nav-pill-btn px-4" id="btn-trend" onclick="showG('trend')">Trend</button>
        <button class="btn btn-outline-primary nav-pill-btn px-4" id="btn-heat" onclick="showG('heat')">Heatmap</button>
        <button class="btn btn-outline-primary nav-pill-btn px-4" id="btn-pie" onclick="showG('pie')">Pie</button>
        <button class="btn btn-outline-primary nav-pill-btn px-4" id="btn-box" onclick="showG('box')">Box Plot</button>
    </div>

    <!-- GRAPH DISPLAY -->
    <div class="viz-display-area shadow-sm mb-4 text-center">
        <div id="bar" class="graph-box active">
            <img src="/static/plots/bar.png?v={{timestamp}}" class="img-fluid rounded">
        </div>

        <div id="trend" class="graph-box">
            <img src="/static/plots/line.png?v={{timestamp}}" class="img-fluid rounded">
        </div>

        <div id="heat" class="graph-box">
            <img src="/static/plots/heat.png?v={{timestamp}}" class="img-fluid rounded">
        </div>

        <div id="pie" class="graph-box">
            <img src="/static/plots/pie.png?v={{timestamp}}" class="img-fluid rounded">
        </div>

        <div id="box" class="graph-box">
            <img src="/static/plots/box.png?v={{timestamp}}" class="img-fluid rounded">
        </div>
    </div> <!-- ✅ FIXED MISSING DIV -->

    <!-- DOWNLOAD -->
    <div class="text-center py-4">
        <a href="/static/uploads/cleaned.csv"
           class="btn btn-success btn-lg rounded-pill px-5 fw-bold shadow">
            Download Cleaned Data
        </a>
    </div>

    {% endif %}
</div>
{% endif %}

<script>
function togglePass() {
    const input = document.getElementById('passInput');
    const icon = document.getElementById('eyeIcon');

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = "password";
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

function toggleV(){
    const b = document.body;
    const newTheme = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    b.setAttribute('data-theme', newTheme);
}

function showG(id) {
    document.querySelectorAll('.graph-box').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav-pill-btn').forEach(btn => {
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline-primary');
    });

    document.getElementById('btn-'+id).classList.replace('btn-outline-primary', 'btn-primary');
}
</script>

</body>
</html>
